{% extends 'base.html' %}
{% block title %}Delete Student{% endblock %}

{% block content %}
<h2>Delete Student</h2>
<p>Are you sure you want to delete "{{ object.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'student_list' %}">Cancel</a>
</form>
{% endblock %}
